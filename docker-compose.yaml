services:
  user-resource-service:
    build: .
    expose:
      - "80"
    restart: always
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-test}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-10}
      API_GW: ${API_GW}
      API_INTERNAL: ${API_INTERNAL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DOMAIN: ${DOMAIN}
      PROD_DOMAIN: ${PROD_DOMAIN}
      NOTIFICATION_SERVICE_NAME: ${NOTIFICATION_SERVICE_NAME:-notification-service:80}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/user-resource-service/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-512M}
          cpus: ${CPU_LIMIT:-0.50}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - coolify

networks:
  app-network:
    name: ${APP_NETWORK:-staging-network}
    external: true
  coolify:
    external: true
