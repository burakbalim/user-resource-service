# H2 Test database settings
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 JSONB support
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cache Configuration
thales.cache.type=IN_MEMORY
thales.cache.enabled=true
spring.cache.type=CAFFEINE
spring.cache.cache-names=users

# Mock Notification Service URL
services.notification-service.url=http://localhost:8080

# Disable Spring Cloud Server URL validation in tests
spring.cloud.openfeign.client.config.default.url-validation=none
spring.cloud.loadbalancer.retry.enabled=false
spring.cloud.loadbalancer.cache.enabled=false

spring.data.redis.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Server Configuration
server.port=0
server.servlet.context-path=/user-resource-service
spring.application.name=user-resource-service

# User Verification Configuration
user.verification.link-template=https://test.wordflashy.com/confirmation/{code}

# JWT Security Configuration
jwt.security.jwks-url=http://localhost:8080/.well-known/jwks.json

